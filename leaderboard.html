<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaic Leaderboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        .leaderboard-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 12px;
            margin-top: 24px;
        }

        .leaderboard-table th {
            text-align: left;
            color: var(--text-secondary);
            font-weight: 600;
            padding: 0 16px;
        }

        .leaderboard-table tr {
            background: rgba(255, 255, 255, 0.03);
            transition: transform 0.2s;
        }

        .leaderboard-table tr:hover {
            transform: scale(1.01);
            background: rgba(255, 255, 255, 0.05);
        }

        .leaderboard-table td {
            padding: 20px 16px;
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
        }

        .leaderboard-table td:first-child {
            border-left: 1px solid var(--glass-border);
            border-radius: 12px 0 0 12px;
        }

        .leaderboard-table td:last-child {
            border-right: 1px solid var(--glass-border);
            border-radius: 0 12px 12px 0;
        }

        .score-badge {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.9rem;
        }

        .rec-advance {
            color: #22c55e;
            font-weight: 700;
        }

        .rec-hold {
            color: #f59e0b;
            font-weight: 700;
        }

        .rec-reject {
            color: #ef4444;
            font-weight: 700;
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 600px;
            z-index: 100;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 99;
        }
    </style>
</head>

<body>
    <div class="container" style="max-width: 1000px;">
        <div class="glass-card fade-in">
            <h1>Recruitment Leaderboard</h1>
            <p class="subtitle">Ranked analysis of candidate judgment and problem-solving skills.</p>

            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>Candidate</th>
                        <th>Role</th>
                        <th>Score</th>
                        <th>Recommendation</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <!-- Data populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Feedback Modal -->
    <div id="modal-overlay" class="modal-overlay"></div>
    <div id="modal" class="glass-card modal">
        <h2 id="modal-name" style="margin-bottom: 12px;"></h2>
        <div id="modal-score" class="score-badge" style="display: inline-block; margin-bottom: 24px;"></div>

        <div style="margin-bottom: 24px;">
            <h4 style="color: var(--accent-blue); margin-bottom: 8px;">Key Strengths</h4>
            <ul id="modal-strengths" style="color: var(--text-secondary); font-size: 0.95rem; padding-left: 20px;"></ul>
        </div>

        <div>
            <h4 style="color: var(--accent-purple); margin-bottom: 8px;">Detailed AI Feedback</h4>
            <p id="modal-feedback" style="color: var(--text-secondary); font-size: 0.95rem; line-height: 1.6;"></p>
        </div>

        <button onclick="closeModal()" class="btn btn-primary" style="margin-top: 32px;">Close</button>
    </div>

    <script>
        async function loadLeaderboard() {
            try {
                const response = await fetch('/leaderboard-data');
                const data = await response.json();

                const body = document.getElementById('leaderboard-body');
                body.innerHTML = '';

                data.sort((a, b) => b.total_score - a.total_score);

                data.forEach((entry, index) => {
                    const tr = document.createElement('tr');
                    const recClass = `rec-${entry.recommendation.toLowerCase()}`;

                    tr.innerHTML = `
                        <td><div style="font-weight:700">${entry.candidate_name}</div><div style="font-size:0.8rem; color:var(--text-secondary)">${entry.company}</div></td>
                        <td>${entry.role}</td>
                        <td><span class="score-badge">${entry.total_score}</span></td>
                        <td class="${recClass}">${entry.recommendation}</td>
                        <td><button class="btn btn-primary" style="padding: 8px 16px; font-size: 0.8rem;" onclick='showDetails(${JSON.stringify(entry).replace(/'/g, "&apos;")})'>Details</button></td>
                    `;
                    body.appendChild(tr);
                });
            } catch (err) {
                console.error(err);
            }
        }

        function showDetails(data) {
            document.getElementById('modal-name').textContent = data.candidate_name;
            document.getElementById('modal-score').textContent = `Total Score: ${data.total_score}/100`;

            const strengthsList = document.getElementById('modal-strengths');
            strengthsList.innerHTML = '';
            data.strengths.forEach(s => {
                const li = document.createElement('li');
                li.textContent = s;
                strengthsList.appendChild(li);
            });

            document.getElementById('modal-feedback').textContent = data.detailed_feedback;

            document.getElementById('modal').style.display = 'block';
            document.getElementById('modal-overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('modal-overlay').style.display = 'none';
        }

        loadLeaderboard();
    </script>
</body>

</html>
