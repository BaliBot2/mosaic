services:
  - type: web
    name: mosaic-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend_server:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: GEMINI_API_KEY
        sync: false # You must set this manually in the Render Dashboard
